name: Syllabank
options:
  bundleIdPrefix: com.shimondeitel.syllabank
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Syllabank:
    type: application
    platform: iOS
    sources:
      - path: Syllabank
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.syllabank
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Syllabank/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SyllabankTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SyllabankTests
      - path: Syllabank.storekit
    dependencies:
      - target: Syllabank
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.syllabank.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SyllabankUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SyllabankUITests
    dependencies:
      - target: Syllabank
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.syllabank.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Syllabank:
    build:
      targets:
        Syllabank: all
        SyllabankTests: [test]
        SyllabankUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Syllabank.storekit
    test:
      config: Debug
      storeKitConfiguration: Syllabank.storekit
      targets:
        - SyllabankTests
        - SyllabankUITests
    archive:
      config: Release
